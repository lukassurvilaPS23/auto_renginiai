[phases.setup]
# Keep this aligned with composer.json (php ^8.2)
nixPkgs = ["php82", "nodejs_22", "npm-11"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan optimize:clear",
  "mkdir -p storage/app/public/renginiu-nuotraukos storage/app/public/profilio-nuotraukos storage/app/public/automobiliai",
  "php artisan storage:link || true",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
# Use Laravel-style router so missing static files reach index.php (storage symlink, etc.)
cmd = "cd public && php -S 0.0.0.0:${PORT} server.php"

